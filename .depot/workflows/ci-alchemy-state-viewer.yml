name: CI alchemy-state-viewer
on:
  push:
    branches: [main]
    paths:
      - 'apps/alchemy-state-viewer/**'
      - '.config/cspell.jsonc'
      - '.config/mise.toml'
      - 'biome.jsonc'
      - '.oxlintrc.json'
      - '.oxfmtrc.json'
      - '.prettierrc.json'
      - '.depot/workflows/ci-alchemy-state-viewer.yml'
  pull_request:
    paths:
      - 'apps/alchemy-state-viewer/**'
      - '.config/cspell.jsonc'
      - '.config/mise.toml'
      - 'biome.jsonc'
      - '.oxlintrc.json'
      - '.oxfmtrc.json'
      - '.prettierrc.json'
      - '.depot/workflows/ci-alchemy-state-viewer.yml'
env:
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}
defaults:
  run:
    working-directory: apps/alchemy-state-viewer
jobs:
  typecheck:
    name: svelte-check
    runs-on: depot-ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: mise
        uses: ./.depot/actions/setup-mise
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: typecheck
        run: mise run typecheck
  lint:
    name: oxlint + biome
    runs-on: depot-ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: mise
        uses: ./.depot/actions/setup-mise
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: lint
        run: mise run lint
  format:
    name: format check
    runs-on: depot-ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: mise
        uses: ./.depot/actions/setup-mise
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: format
        run: mise run format
  build:
    name: vite build
    runs-on: depot-ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: mise
        uses: ./.depot/actions/setup-mise
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: build
        run: mise run build
  vitest:
    name: vitest
    runs-on: depot-ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: mise
        uses: ./.depot/actions/setup-mise
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: vitest
        run: mise run test
  smoke:
    name: smoke (local production boot)
    runs-on: depot-ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: mise
        uses: ./.depot/actions/setup-mise
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: smoke
        run: mise run smoke
