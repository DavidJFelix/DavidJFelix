name: CD Deploy calendar-visualizer

on:
  push:
    branches: [main]
    paths:
      - 'apps/calendar-visualizer/**'
      - '.github/workflows/cd-deploy-calendar-visualizer.yml'

defaults:
  run:
    working-directory: apps/calendar-visualizer

jobs:
  deploy:
    name: wrangler deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: mise
        uses: ./.github/actions/setup-mise

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: panda codegen
        run: pnpm exec panda codegen

      # Sentry: PUBLIC_SENTRY_DSN (public, a repo variable) turns the browser SDK
      # on for production only; the auth token (secret) + org + project enable
      # source-map upload. All gated in astro.config.mjs — unset means no Sentry
      # code ships, so preview/CI/e2e stay clean.
      #
      # PostHog: PUBLIC_POSTHOG_KEY (the project key — public by design, so a repo
      # variable, not a secret) turns analytics on for production only. index.astro
      # only renders the snippet when it's set, so preview/CI/e2e ship no PostHog
      # code. Unset until the variable is created (see issue #261), so deploys stay
      # dark until then.
      - name: astro build
        env:
          PUBLIC_SENTRY_DSN: ${{ vars.SENTRY_DSN_CALENDAR_VISUALIZER }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_CALENDAR_VISUALIZER }}
          PUBLIC_POSTHOG_KEY: ${{ vars.POSTHOG_KEY_CALENDAR_VISUALIZER }}
        run: pnpm exec astro build

      # Deploy the @astrojs/cloudflare adapter's build. The build emits the worker
      # + a resolved config at dist/server/wrangler.json (assets -> dist/client),
      # so deploy points at that, not the source wrangler.toml.
      - name: wrangler deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy -c dist/server/wrangler.json
          workingDirectory: apps/calendar-visualizer
