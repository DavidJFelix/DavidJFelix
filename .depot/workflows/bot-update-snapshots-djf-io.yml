# Depot CI Migration
# Source: .github/workflows/bot-update-snapshots-djf-io.yml
#
# Changes made:
# - Rewrote .github/ path references to .depot/
# - Changed GitHub runs-on labels to their Depot equivalents

name: Bot Update Snapshots djf.io
# Regenerate djf.io's Playwright visual baselines on demand. A maintainer adds
# the `update-snapshots` label to a PR; this re-runs the e2e suite with
# --update-snapshots on the Linux runner (the only place that can produce the
# committed `*-chromium-linux.png` baselines) and pushes the result back to the
# PR branch. Label-triggered and not a merge gate, so this is a Bot workflow.
#
# Caveat: the commit is pushed with GITHUB_TOKEN, and GitHub deliberately does
# not re-trigger workflows for bot-token pushes, so the `playwright` check will
# not re-run automatically on the new commit -- re-run it once from the Actions
# tab (or push any commit) to turn it green. The bot leaves a comment saying so.
on:
  pull_request:
    types: [labeled]
concurrency:
  group: bot-update-snapshots-djf-io-${{ github.event.pull_request.number }}
  cancel-in-progress: true
env:
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}
jobs:
  snapshot:
    name: snapshot image
    # Shared djf-io sandbox image (mise tools + node_modules + Chromium).
    # Depot skips this job while the image tag exists; the job below boots
    # from the image. See docs/contributing/github-actions-style.md. Gated on
    # the same label as the main job so unrelated label events skip both.
    if: >-
      github.event.label.name == 'update-snapshots' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: depot-ubuntu-latest
    snapshot:
      image-name: djf-io
      version: v1
      with:
        max-age: 7d
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: snapshot setup
        uses: ./.depot/actions/snapshot-setup
        with:
          app: djf.io
  update-snapshots:
    name: playwright --update-snapshots
    # Only react to our label, and only for same-repo PRs -- the token cannot
    # push to a fork's branch.
    if: >-
      github.event.label.name == 'update-snapshots' && github.event.pull_request.head.repo.full_name == github.repository
    needs: snapshot
    runs-on:
      image: djf-io
      size: 2x8
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    defaults:
      run:
        working-directory: apps/djf.io
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: false
          clean: false
      - name: mise install
        run: mise install
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      # Chromium and its OS packages ship in the snapshot image; this only
      # downloads a browser when the PR bumps Playwright past the image.
      - name: playwright install
        run: pnpm exec playwright install chromium
      - name: playwright --update-snapshots
        run: pnpm exec playwright test --update-snapshots
      - name: git push
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          # Baselines are PNGs *inside* the *-snapshots/ dirs, so the pathspec
          # needs the trailing /** to reach them. Stage first, then check the
          # index, so a brand-new (untracked) snapshot is committed too.
          git add 'apps/djf.io/**/*-snapshots/**'
          if git diff --cached --quiet; then
            echo 'No snapshot changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'test(djf.io): update Playwright visual baselines'
          # persist-credentials is false (ghalint policy 013), so push via an
          # explicit token URL instead of a stored credential.
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${HEAD_REF}"
      - name: gh pr comment
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR" --body 'Regenerated the Playwright visual baselines and pushed them to this branch. Re-run the **playwright** check once (Actions tab) so it picks up the new commit -- bot-token pushes do not auto-trigger it.'
      - name: gh pr edit
        if: always()
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: gh pr edit "$PR" --remove-label update-snapshots
