# Depot CI Migration
# Source: .github/workflows/ci-djf-io.yml
#
# Changes made:
# - Rewrote .github/ path references to .depot/
# - Changed GitHub runs-on labels to their Depot equivalents

name: CI djf.io
on:
  push:
    branches: [main]
    paths:
      - 'apps/djf.io/**'
      - '.config/cspell.json'
      - '.config/mise.toml'
      - 'biome.jsonc'
      - '.oxlintrc.json'
      - '.prettierrc.json'
      - '.depot/workflows/ci-djf-io.yml'
      - '.depot/actions/snapshot-setup/**'
  pull_request:
    paths:
      - 'apps/djf.io/**'
      - '.config/cspell.json'
      - '.config/mise.toml'
      - 'biome.jsonc'
      - '.oxlintrc.json'
      - '.prettierrc.json'
      - '.depot/workflows/ci-djf-io.yml'
      - '.depot/actions/snapshot-setup/**'
env:
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}
defaults:
  run:
    working-directory: apps/djf.io
jobs:
  snapshot:
    name: snapshot image
    # Shared djf-io sandbox image (mise tools + node_modules + Chromium).
    # Depot skips this job while the image tag exists; the other jobs boot
    # from the image. See docs/contributing/github-actions-style.md.
    runs-on: depot-ubuntu-latest
    snapshot:
      image-name: djf-io
      version: v1
      with:
        max-age: 7d
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: snapshot setup
        uses: ./.depot/actions/snapshot-setup
        with:
          app: djf.io
  typecheck:
    name: astro check
    needs: snapshot
    runs-on:
      image: djf-io
      size: 2x8
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          clean: false
      - name: mise install
        run: mise install
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: typecheck
        run: mise run typecheck
  lint:
    name: biome + oxlint
    needs: snapshot
    runs-on:
      image: djf-io
      size: 2x8
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          clean: false
      - name: mise install
        run: mise install
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: lint
        run: mise run lint
  format:
    name: format check
    needs: snapshot
    runs-on:
      image: djf-io
      size: 2x8
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          clean: false
      - name: mise install
        run: mise install
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: format
        run: mise run format
  build:
    name: astro build
    needs: snapshot
    runs-on:
      image: djf-io
      size: 2x8
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          clean: false
      - name: mise install
        run: mise install
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: build
        run: mise run build
  vitest:
    name: vitest
    needs: snapshot
    runs-on:
      image: djf-io
      size: 2x8
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          clean: false
      - name: mise install
        run: mise install
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: vitest
        run: mise run test:unit
  playwright:
    name: playwright
    needs: snapshot
    runs-on:
      image: djf-io
      size: 2x8
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          clean: false
      - name: mise install
        run: mise install
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      # Chromium and its OS packages ship in the snapshot image; this only
      # downloads a browser when the PR bumps Playwright past the image.
      - name: playwright install
        run: pnpm exec playwright install chromium
      - name: playwright
        run: mise run test:e2e
      - name: upload-artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: apps/djf.io/playwright-report/
          retention-days: 14
