# Depot CI Migration
# Source: .github/workflows/ci-repo.yml
#
# Changes made:
# - Rewrote .github/ path references to .depot/
# - Changed GitHub runs-on labels to their Depot equivalents

name: CI repo
on:
  push:
    branches: [main]
    paths:
      - 'biome.jsonc'
      - '.oxlintrc.json'
      - '.oxfmtrc.json'
      - '.prettierrc.json'
      - '.config/cspell.jsonc'
      - '.config/mise.toml'
      - '.github/renovate.json'
      - '.vscode/settings.json'
      - '.vscode/extensions.json'
      - 'bin/**'
      - '.agents/agents/**'
      - '.claude/agents/**'
      - '.depot/workflows/ci-repo.yml'
  pull_request:
    paths:
      - 'biome.jsonc'
      - '.oxlintrc.json'
      - '.oxfmtrc.json'
      - '.prettierrc.json'
      - '.config/cspell.jsonc'
      - '.config/mise.toml'
      - '.github/renovate.json'
      - '.vscode/settings.json'
      - '.vscode/extensions.json'
      - 'bin/**'
      - '.agents/agents/**'
      - '.claude/agents/**'
      - '.depot/workflows/ci-repo.yml'
env:
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}
jobs:
  format:
    name: format check (root config files)
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: mise
        uses: ./.depot/actions/setup-mise
      - name: format
        run: mise run format
  bin-test:
    name: bun test (bin/)
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: mise
        uses: ./.depot/actions/setup-mise
      - name: test bin
        run: mise run test:bin
  check-agents:
    name: check agents (persona frontmatter + symlink mirror)
    runs-on: depot-ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: mise
        uses: ./.depot/actions/setup-mise
      - name: check agents
        run: mise run check:agents
