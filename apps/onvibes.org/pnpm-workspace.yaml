allowBuilds:
  # Optional native deps pulled in transitively; not exercised here, so skip
  # their build scripts.
  '@mongodb-js/zstd': false
  '@sentry/cli': true
  # core-js's postinstall is only a funding banner -- no native build to run.
  core-js: false
  # Transitive deps of the Cloudflare `agents` SDK / pi-ai; funding/postinstall
  # banners only, no native build to run.
  '@google/genai': false
  core-js-pure: false
  esbuild: true
  node-liblzma: false
  protobufjs: false
  sharp: true
  workerd: true
