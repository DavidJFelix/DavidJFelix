# Depot CI Migration
# Source: .github/workflows/cd-preview-ravrun.yml
#
# Changes made:
# - Rewrote .github/ path references to .depot/
# - Changed GitHub runs-on labels to their Depot equivalents

name: CD Preview ravrun
# Per-PR preview deploy for ravrun (wrangler). On every PR touching the app:
# upload a non-active version with a pr-<N> preview alias, smoke the preview URL,
# screenshot-diff it against committed baselines, and post the URL. No teardown
# -- `wrangler versions upload` never serves production. Forks have no secrets
# and will fail the deploy step -- acceptable for a personal monorepo; do NOT
# switch to pull_request_target.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/ravrun/**'
      - '.depot/workflows/cd-preview-ravrun.yml'
      - '.depot/actions/preview-wrangler/**'
      - '.depot/actions/snapshot-setup/**'
      - 'bin/**'
concurrency:
  group: preview-ravrun-${{ github.event.pull_request.number }}
  cancel-in-progress: true
defaults:
  run:
    working-directory: apps/ravrun
env:
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}
jobs:
  snapshot:
    name: snapshot image
    # Shared ravrun sandbox image (mise tools + node_modules + Chromium).
    # Depot skips this job while the image tag exists; the other jobs boot
    # from the image. See docs/contributing/github-actions-style.md.
    runs-on: depot-ubuntu-latest
    snapshot:
      image-name: ravrun
      version: v1
      with:
        max-age: 7d
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: snapshot setup
        uses: ./.depot/actions/snapshot-setup
        with:
          app: ravrun
  preview:
    name: deploy + smoke + screenshots
    needs: snapshot
    runs-on:
      image: ravrun
      size: 2x8
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          clean: false
      - name: mise install
        run: mise install
      - name: preview
        uses: ./.depot/actions/preview-wrangler
        with:
          worker-name: ravrun
          pr-number: ${{ github.event.pull_request.number }}
          smoke-routes: /
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
