# Depot CI Migration
# Source: .github/workflows/cd-preview-onvibes-org.yml
#
# Changes made:
# - Rewrote .github/ path references to .depot/
# - Changed GitHub runs-on labels to their Depot equivalents

name: CD Preview onvibes.org
# Per-PR preview deploy for onvibes.org. The Worker carries Durable Objects
# (the Flue agent runtime), and `wrangler versions upload` cannot carry DO
# migrations (Cloudflare error 10211) — so instead of a preview version of the
# production Worker, each PR gets an ISOLATED `onvibes-org-pr-<N>` Worker via a
# real `wrangler deploy` (migrations apply cleanly; DO state is per-preview,
# never shared with production). Smoke + screenshots run against its
# workers.dev URL, and the Worker is deleted when the PR closes. Forks have no
# secrets and will fail the deploy step -- acceptable for a personal monorepo;
# do NOT switch to pull_request_target.
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'apps/onvibes.org/**'
      - '.depot/workflows/cd-preview-onvibes-org.yml'
      - '.depot/actions/preview-worker/**'
      - '.depot/actions/preview-worker-teardown/**'
      - 'bin/**'
# One preview per PR; a new push cancels an in-flight preview. A close event
# shares the group so teardown supersedes any running preview.
concurrency:
  group: preview-onvibes-org-${{ github.event.pull_request.number }}
  cancel-in-progress: true
defaults:
  run:
    working-directory: apps/onvibes.org
env:
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}
jobs:
  preview:
    name: deploy + smoke + screenshots
    if: github.event.action != 'closed'
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: mise
        uses: ./.depot/actions/setup-mise
      - name: preview
        uses: ./.depot/actions/preview-worker
        with:
          worker-name: onvibes-org
          pr-number: ${{ github.event.pull_request.number }}
          smoke-routes: /,/chat
          wrangler-config: dist-flue/onvibes_org/wrangler.json
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
  teardown:
    name: delete preview worker
    if: github.event.action == 'closed'
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: mise
        uses: ./.depot/actions/setup-mise
      - name: teardown
        uses: ./.depot/actions/preview-worker-teardown
        with:
          worker-name: onvibes-org
          pr-number: ${{ github.event.pull_request.number }}
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
