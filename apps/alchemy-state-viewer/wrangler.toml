#:schema node_modules/wrangler/config-schema.json
name = "alchemy-state-viewer"
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Intentionally served from workers.dev only -- this is a personal
# infrastructure dashboard, not a public site. All runtime configuration is
# committed here (the vars + binding below); see .dev.vars.example for local
# dev. The app does no authentication of its own: the deployed worker sits
# behind Cloudflare Access on its workers.dev route.

# Not a secret: the URL is derivable from the account's workers.dev
# subdomain, and the store is protected by its bearer token, not obscurity.
[vars]
ALCHEMY_STATE_URL = "https://alchemy-state-store.nullserve.workers.dev"

# The state-store bearer token is read from the secret the alchemy bootstrap
# already keeps in the account Secrets Store -- the value is never copied
# into this worker's own secrets, and rotation is picked up automatically.
# `store_id` is the account's Secrets Store id: `wrangler secrets-store store
# list`, or dashboard -> Secrets Store.
[[secrets_store_secrets]]
binding = "ALCHEMY_STATE_TOKEN_SECRET"
store_id = "32c9c129106d4fd0a12015a4eded9fb6"
secret_name = "AlchemyStateStoreToken"

# Worker-to-worker on the same zone cannot use global fetch (Cloudflare
# error 1042, surfaced as HTTP 404) -- requests to the state store worker go
# through this service binding instead, staying inside Cloudflare.
[[services]]
binding = "ALCHEMY_STATE_STORE"
service = "alchemy-state-store"

[assets]
binding = "ASSETS"
directory = ".svelte-kit/cloudflare"

[observability]
enabled = true
