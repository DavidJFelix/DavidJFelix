# Warden — AI code review on every pull request.
#
# Adapted from `warden init`'s generated .github/workflows/warden.yml to this
# repo's conventions (Depot runners, pinned SHAs, persist-credentials off).
#
# Two deliberate deviations from docs/github-actions-style.md, both because
# Warden reviews the whole PR diff rather than one subtree:
#   - No `paths:` filter. Like ci-spell.yml, this is a repo-wide gate; scoping
#     it to a subtree would blind the review to everything else in the diff.
#   - `pull_request` only, no `push` to main. Warden needs a PR context (it
#     diffs head against base); there is nothing for it to review on a push.
#
# Config lives in /warden.toml. The model (WARDEN_MODEL) and OpenRouter key
# (WARDEN_OPENROUTER_API_KEY) come from repository/org secrets.
name: CI Warden
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

# contents: write is required for resolving review threads via GraphQL.
# See: https://github.com/orgs/community/discussions/44650
permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  review:
    name: warden
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 20
    env:
      WARDEN_MODEL: ${{ secrets.WARDEN_MODEL }}
      WARDEN_OPENROUTER_API_KEY: ${{ secrets.WARDEN_OPENROUTER_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      # Split analyze/report so GitHub write credentials don't hold the long
      # model-backed analysis run (recommended by the Warden GitHub guide).
      - name: warden analyze
        id: warden-analyze
        uses: getsentry/warden@c85791e0571b0d03646e6d2cbacc772831ff9ff6 # v0.38.1
        with:
          mode: analyze
      - name: warden report
        uses: getsentry/warden@c85791e0571b0d03646e6d2cbacc772831ff9ff6 # v0.38.1
        with:
          mode: report
          findings-file: ${{ steps.warden-analyze.outputs.findings-file }}
