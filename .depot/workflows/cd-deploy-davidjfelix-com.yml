# Depot CI Migration
# Source: .github/workflows/cd-deploy-davidjfelix-com.yml
#
# Changes made:
# - Rewrote .github/ path references to .depot/
# - Changed GitHub runs-on labels to their Depot equivalents

name: CD Deploy davidjfelix.com
on:
  push:
    branches: [main]
    paths:
      - 'apps/davidjfelix.com/**'
      - '.depot/workflows/cd-deploy-davidjfelix-com.yml'
defaults:
  run:
    working-directory: apps/davidjfelix.com
jobs:
  deploy:
    name: wrangler deploy
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: mise
        uses: ./.depot/actions/setup-mise
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: astro build
        env:
          PUBLIC_SENTRY_DSN: ${{ vars.SENTRY_DSN_DAVIDJFELIX_COM }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_DAVIDJFELIX_COM }}
          PUBLIC_POSTHOG_KEY: ${{ vars.POSTHOG_KEY_DAVIDJFELIX_COM }}
        run: pnpm exec astro build
      - name: wrangler deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy -c dist/server/wrangler.json
          workingDirectory: apps/davidjfelix.com
