allowBuilds:
  '@sentry/cli': true
  # core-js's postinstall is only a funding banner -- no native build to run.
  core-js: false
  esbuild: true
  sharp: true
  workerd: true

overrides:
  # rolldown 1.1.5 drops vite-ignored external dynamic imports (the pagefind
  # loader in Search.astro) from chunk dynamicImports metadata, so Astro's
  # script inliner pulls the chunk into the page HTML before Vite substitutes
  # the __VITE_PRELOAD__ marker -- every page then throws a ReferenceError and
  # search dies. Pin to 1.1.4 until rolldown fixes the metadata regression;
  # the Search e2e suite covers the unpin.
  rolldown: 1.2.0
