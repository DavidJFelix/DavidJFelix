name: CI f311x

on:
  push:
    branches: [main]
    paths:
      - 'apps/f311x/**'
      - '.config/cspell.json'
      - '.config/mise.toml'
      - 'biome.jsonc'
      - '.github/workflows/ci_f311x.yml'
      - '.github/workflows/cd_deploy_f311x.yml'
  pull_request:
    paths:
      - 'apps/f311x/**'
      - '.config/cspell.json'
      - '.config/mise.toml'
      - 'biome.jsonc'
      - '.github/workflows/ci_f311x.yml'
      - '.github/workflows/cd_deploy_f311x.yml'

defaults:
  run:
    working-directory: apps/f311x

jobs:
  lint:
    name: biome + oxlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: biome
        run: pnpm exec biome check .

      - name: oxlint
        run: pnpm exec oxlint

  typecheck:
    name: tsgo
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm run typecheck

  build:
    name: vite build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: build
        run: pnpm run build

  vitest:
    name: vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: vitest
        run: pnpm run test
