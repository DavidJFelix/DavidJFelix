# Depot CI Migration
# Source: .github/workflows/cd-deploy-ravrun.yml
#
# Changes made:
# - Rewrote .github/ path references to .depot/
# - Changed GitHub runs-on labels to their Depot equivalents

name: CD Deploy ravrun
on:
  push:
    branches: [main]
    paths:
      - 'apps/ravrun/**'
      - '.depot/workflows/cd-deploy-ravrun.yml'
      - '.depot/actions/snapshot-setup/**'
env:
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}
defaults:
  run:
    working-directory: apps/ravrun
jobs:
  snapshot:
    name: snapshot image
    # Shared ravrun sandbox image (mise tools + node_modules + Chromium).
    # Depot skips this job while the image tag exists; the other jobs boot
    # from the image. See docs/contributing/github-actions-style.md.
    runs-on: depot-ubuntu-latest
    snapshot:
      image-name: ravrun
      version: v1
      with:
        max-age: 7d
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: snapshot setup
        uses: ./.depot/actions/snapshot-setup
        with:
          app: ravrun
  deploy:
    name: wrangler deploy
    needs: snapshot
    runs-on:
      image: ravrun
      size: 2x8
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          clean: false
      - name: mise install
        run: mise install
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: vite build
        env:
          VITE_PUBLIC_SENTRY_DSN: ${{ vars.SENTRY_DSN_RAVRUN }}
          VITE_PUBLIC_POSTHOG_KEY: ${{ vars.POSTHOG_KEY_RAVRUN }}
        run: pnpm exec vite build
      - name: wrangler deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: apps/ravrun
