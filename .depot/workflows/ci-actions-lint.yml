# Depot CI Migration
# Source: .github/workflows/ci-actions-lint.yml
#
# Lints the Depot workflows themselves. The workflows now live in
# .depot/workflows/ (run on Depot's runners), so the linters are pointed there
# explicitly:
# - actionlint / zizmor / pinact accept explicit paths, so they cover both the
#   workflows and the .depot/actions/* composites.
# - ghalint's `run` is hardcoded to .github/workflows/ and cannot target
#   .depot/workflows/, so it only lints the composite actions via `run-action`.
#   actionlint (correctness) + zizmor (security audit) cover the workflows.
name: CI Actions Lint
on:
  push:
    branches: [main]
    paths:
      - '.depot/workflows/**'
      - '.depot/actions/**'
      - '.github/zizmor.yml'
      - '.github/actionlint.yaml'
      - '.config/mise.toml'
  pull_request:
    paths:
      - '.depot/workflows/**'
      - '.depot/actions/**'
      - '.github/zizmor.yml'
      - '.github/actionlint.yaml'
      - '.config/mise.toml'
jobs:
  lint:
    name: actionlint + ghalint + zizmor + pinact
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: mise
        uses: ./.depot/actions/setup-mise
      - name: Verify mise.lock matches mise.toml
        # mise install during the previous step updates .config/mise.lock if
        # mise.toml has gained or bumped a tool. A non-empty diff here means
        # whoever changed mise.toml forgot to commit the lockfile update.
        run: |
          if ! git diff --exit-code .config/mise.lock; then
            echo "::error file=.config/mise.lock::.config/mise.lock is out of date. Run 'mise install' locally (with GITHUB_TOKEN set, or 'gh auth login' first) and commit the updated lockfile. See CONTRIBUTING.md for details."
            exit 1
          fi
      - name: actionlint
        run: actionlint -config-file .github/actionlint.yaml .depot/workflows/*.yml
      - name: ghalint (composite actions)
        run: ghalint run-action .depot/actions/*/action.yml
      - name: zizmor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: zizmor .depot/workflows/*.yml .depot/actions/*/action.yml
      - name: pinact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pinact run --check .depot/workflows/*.yml .depot/actions/*/action.yml
