# Depot CI Migration
# Source: .github/workflows/cd-preview-f311x.yml
#
# Changes made:
# - Rewrote .github/ path references to .depot/
# - Changed GitHub runs-on labels to their Depot equivalents

name: CD Preview f311x
# Per-PR preview deploy for f311x (the preview-deployments proving ground).
# On every PR touching apps/f311x: deploy an isolated Alchemy stage (pr-<N>),
# smoke it, screenshot-diff it against committed baselines, and post the URL.
# On close: tear the stage down. Forks have no secrets and will fail the deploy
# step -- acceptable for a personal monorepo; do NOT switch to pull_request_target.
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'apps/f311x/**'
      - '.depot/workflows/cd-preview-f311x.yml'
      - '.depot/actions/snapshot-setup/**'
# One preview per PR; a new push cancels an in-flight preview. A close event
# shares the group so teardown supersedes any running preview.
concurrency:
  group: preview-f311x-${{ github.event.pull_request.number }}
  cancel-in-progress: true
env:
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}
defaults:
  run:
    working-directory: apps/f311x
jobs:
  snapshot:
    name: snapshot image
    # Shared f311x sandbox image (mise tools + node_modules + Chromium).
    # Depot skips this job while the image tag exists; the other jobs boot
    # from the image. See docs/contributing/github-actions-style.md.
    runs-on: depot-ubuntu-latest
    snapshot:
      image-name: f311x
      version: v1
      with:
        max-age: 7d
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: snapshot setup
        uses: ./.depot/actions/snapshot-setup
        with:
          app: f311x
  preview:
    name: deploy + smoke + screenshots
    if: github.event.action != 'closed'
    needs: snapshot
    runs-on:
      image: f311x
      size: 2x8
    # install (~1m) + deploy cap (10m) + smoke + screenshots, with headroom.
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: write
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          clean: false
      - name: mise install
        run: mise install
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      # Builds happen inside `alchemy deploy` (Cloudflare.Vite resource); the
      # wrapper resolves the deployed *.workers.dev URL into `url`.
      - name: deploy preview
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.F311X_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.F311X_CLOUDFLARE_ACCOUNT_ID }}
          ALCHEMY_NO_TUI: '1'
          ALCHEMY_TELEMETRY_DISABLED: '1'
        run: bun bin/deploy-preview.ts
      # workers.dev is live immediately (no custom-domain DNS), so a few quick
      # attempts suffice instead of the prod gate's long propagation retries.
      - name: smoke test
        id: smoke
        env:
          SMOKE_URLS: ${{ steps.deploy.outputs.url }}
          SMOKE_ATTEMPTS: '4'
          SMOKE_RETRY_DELAY_MS: '5000'
        run: bun bin/smoke-test.ts
      # Chromium and its OS packages ship in the snapshot image; this only
      # downloads a browser when the PR bumps Playwright past the image.
      - name: playwright install
        run: pnpm exec playwright install chromium
      # PREVIEW_URL set => playwright.config.ts skips the local boot and points
      # at the deployed preview. `pnpm run` (not `mise run`) avoids the e2e
      # task's local build dependency, which the preview path doesn't need.
      - name: screenshots
        id: e2e
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        run: pnpm run test:e2e
      - name: upload playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: apps/f311x/playwright-report/
          retention-days: 14
      # Shared with every wrangler app's preview via bin/comment-preview.ts; the
      # marker/title/footer make it f311x-specific. $GITHUB_WORKSPACE resolves
      # the repo-root script despite the app-dir working directory.
      - name: comment preview url
        if: ${{ !cancelled() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
          PREVIEW_MARKER: '<!-- f311x-preview -->'
          PREVIEW_TITLE: f311x preview
          PREVIEW_FOOTER: 'Stage `pr-${{ github.event.pull_request.number }}`; torn down automatically when this PR closes.'
          PREVIEW_STATUS: >-
            ${{ (steps.smoke.outcome == 'success' && steps.e2e.outcome == 'success') && '✅ passed' || '❌ failed' }}
        run: bun "$GITHUB_WORKSPACE/bin/comment-preview.ts"
  teardown:
    name: destroy preview stage
    if: github.event.action == 'closed'
    needs: snapshot
    runs-on:
      image: f311x
      size: 2x8
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          clean: false
      - name: mise install
        run: mise install
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: destroy preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.F311X_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.F311X_CLOUDFLARE_ACCOUNT_ID }}
          ALCHEMY_NO_TUI: '1'
          ALCHEMY_TELEMETRY_DISABLED: '1'
        run: bun bin/destroy-preview.ts
