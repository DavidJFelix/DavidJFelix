# Warden — AI code review on pull requests.
# Guide: https://warden.sentry.dev/guide  ·  Source: https://github.com/getsentry/warden
#
# Runtime is Pi pointed at OpenRouter, so the review model is swappable without
# editing this file: the model is chosen via the WARDEN_MODEL env/secret
# (an "openrouter/<provider>/<model>" selector), and WARDEN_OPENROUTER_API_KEY
# supplies the credential. CI reads both from Depot secrets (the workflows run
# on Depot CI, which never sees GitHub repo secrets). For a local `warden run`,
# export the same two vars. The model must exist in the Pi runtime's bundled
# catalog, not just on OpenRouter — an uncataloged slug fails every chunk with
# a misleading "usually an authentication problem" error.
#
# Lives at the repo root because both the CLI and the getsentry/warden action
# resolve `./warden.toml` relative to the git root (a documented-default, like
# Cargo.toml — see docs/contributing/configuration-style.md). Skills are managed with
# `warden add <name>` / `warden sync`. The bundled `warden` / `warden-sweep`
# agent-authoring skills that `warden init` offers were deliberately not
# installed into .agents/skills/ — add them later only if we author custom
# review skills.

version = 1

# Inherited by every skill below.
[defaults]
runtime = "pi"
# Severity gate. failOn: lowest severity that fails the PR check.
# reportOn: lowest severity posted as an inline annotation.
# Levels: critical, high, medium, low, info, off.
failOn = "high"
reportOn = "medium"
# Without this, findings at/above failOn post as a neutral check, never a
# failure — Warden's determineConclusion only returns "failure" when failCheck
# is set. This is what makes the gate actually gate.
failCheck = true

# Built-in baseline application-security review. Whole-repo: no `paths` filter,
# so it sees the entire PR diff across all apps and root config.
[[skills]]
name = "security-review"

[[skills.triggers]]
type = "pull_request"
actions = ["opened", "synchronize", "reopened", "ready_for_review", "labeled"]
# Skip draft PRs — review once the PR is marked ready, not on every WIP push.
draft = false
# With draft set, the matcher runs on (non-draft) OR (has this label), and
# `labeled` events only match this specific label. Net effect: every non-draft
# PR reviews as usual, random labels no longer trigger re-reviews, and adding
# the "Warden" label is the manual re-run lever (it also opts in a draft).
labels = ["Warden"]

# Built-in correctness / logic-bug review. Also whole-repo.
[[skills]]
name = "code-review"

[[skills.triggers]]
type = "pull_request"
actions = ["opened", "synchronize", "reopened", "ready_for_review", "labeled"]
draft = false
labels = ["Warden"]
