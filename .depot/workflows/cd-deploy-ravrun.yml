# Depot CI Migration
# Source: .github/workflows/cd-deploy-ravrun.yml
#
# Changes made:
# - Rewrote .github/ path references to .depot/
# - Changed GitHub runs-on labels to their Depot equivalents

name: CD Deploy ravrun
on:
  push:
    branches: [main]
    paths:
      - 'apps/ravrun/**'
      - '.depot/workflows/cd-deploy-ravrun.yml'
defaults:
  run:
    working-directory: apps/ravrun
jobs:
  deploy:
    name: wrangler deploy
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    steps:
      - name: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: mise
        uses: ./.depot/actions/setup-mise
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: vite build
        env:
          VITE_PUBLIC_SENTRY_DSN: ${{ vars.SENTRY_DSN_RAVRUN }}
          VITE_PUBLIC_POSTHOG_KEY: ${{ vars.POSTHOG_KEY_RAVRUN }}
        run: pnpm exec vite build
      - name: wrangler deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: apps/ravrun
