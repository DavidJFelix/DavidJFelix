name: CI repo

on:
  push:
    branches: [main]
    paths:
      - 'biome.jsonc'
      - '.oxlintrc.json'
      - '.prettierrc.json'
      - '.config/cspell.json'
      - '.config/mise.toml'
      - '.github/renovate.json'
      - '.vscode/settings.json'
      - '.vscode/extensions.json'
      - 'bin/**'
      - '.github/workflows/ci-repo.yml'
  pull_request:
    paths:
      - 'biome.jsonc'
      - '.oxlintrc.json'
      - '.prettierrc.json'
      - '.config/cspell.json'
      - '.config/mise.toml'
      - '.github/renovate.json'
      - '.vscode/settings.json'
      - '.vscode/extensions.json'
      - 'bin/**'
      - '.github/workflows/ci-repo.yml'

env:
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}

jobs:
  format:
    name: format check (root config files)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: mise
        uses: ./.github/actions/setup-mise

      - name: format
        run: mise run format

  bin-test:
    name: bun test (bin/)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: mise
        uses: ./.github/actions/setup-mise

      - name: test bin
        run: mise run test:bin
