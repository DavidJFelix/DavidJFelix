name: CI forzamonica.com

on:
  push:
    branches: [main]
    paths:
      - 'apps/forzamonica.com/**'
      - '.config/cspell.json'
      - '.config/mise.toml'
      - 'biome.jsonc'
      - '.oxlintrc.json'
      - '.prettierrc.json'
      - '.github/workflows/ci-forzamonica-com.yml'
      - '.github/workflows/cd-deploy-forzamonica-com.yml'
  pull_request:
    paths:
      - 'apps/forzamonica.com/**'
      - '.config/cspell.json'
      - '.config/mise.toml'
      - 'biome.jsonc'
      - '.oxlintrc.json'
      - '.prettierrc.json'
      - '.github/workflows/ci-forzamonica-com.yml'
      - '.github/workflows/cd-deploy-forzamonica-com.yml'

env:
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}

defaults:
  run:
    working-directory: apps/forzamonica.com

jobs:
  typecheck:
    name: tsgo
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: mise run typecheck

  lint:
    name: biome + oxlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: lint
        run: mise run lint

  format:
    name: format check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: format
        run: mise run format

  build:
    name: vite build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: build
        run: mise run build

  vitest:
    name: vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: vitest
        run: mise run test
