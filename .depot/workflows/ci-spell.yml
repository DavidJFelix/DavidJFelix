# Depot CI Migration
# Source: .github/workflows/ci-spell.yml
#
# Changes made:
# - Rewrote .github/ path references to .depot/
# - Changed GitHub runs-on labels to their Depot equivalents

name: CI spell
# Repo-wide spell check. Unlike the per-app and root-config workflows, this has no
# paths filter: cspell is a universal gate that runs on every push and PR.
on:
  push:
    branches: [main]
  pull_request:
env:
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}
jobs:
  spell:
    name: spell check (cspell)
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: mise
        uses: ./.depot/actions/setup-mise
      - name: spell
        run: mise run spell
