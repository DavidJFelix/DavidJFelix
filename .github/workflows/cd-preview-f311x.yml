name: CD Preview f311x

# Per-PR preview deploy for f311x (the preview-deployments proving ground).
# On every PR touching apps/f311x: deploy an isolated Alchemy stage (pr-<N>),
# smoke it, screenshot-diff it against committed baselines, and post the URL.
# On close: tear the stage down. Forks have no secrets and will fail the deploy
# step -- acceptable for a personal monorepo; do NOT switch to pull_request_target.

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'apps/f311x/**'
      - '.github/workflows/cd-preview-f311x.yml'

# One preview per PR; a new push cancels an in-flight preview. A close event
# shares the group so teardown supersedes any running preview.
concurrency:
  group: preview-f311x-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}

defaults:
  run:
    working-directory: apps/f311x

jobs:
  preview:
    name: deploy + smoke + screenshots
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    # install (~1m) + deploy cap (10m) + smoke + screenshots, with headroom.
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: write
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      # Builds happen inside `alchemy deploy` (Cloudflare.Vite resource); the
      # wrapper resolves the deployed *.workers.dev URL into `url`.
      - name: deploy preview
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.F311X_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.F311X_CLOUDFLARE_ACCOUNT_ID }}
          ALCHEMY_NO_TUI: '1'
          ALCHEMY_TELEMETRY_DISABLED: '1'
        run: bun bin/deploy-preview.ts

      # workers.dev is live immediately (no custom-domain DNS), so a few quick
      # attempts suffice instead of the prod gate's long propagation retries.
      - name: smoke test
        id: smoke
        env:
          SMOKE_URLS: ${{ steps.deploy.outputs.url }}
          SMOKE_ATTEMPTS: '4'
          SMOKE_RETRY_DELAY_MS: '5000'
        run: bun bin/smoke-test.ts

      - name: resolve playwright version
        id: pw-version
        run: |
          version=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: cache playwright browsers
        id: pw-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: playwright install
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: playwright install-deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      # PREVIEW_URL set => playwright.config.ts skips the local boot and points
      # at the deployed preview. `pnpm run` (not `mise run`) avoids the e2e
      # task's local build dependency, which the preview path doesn't need.
      - name: screenshots
        id: e2e
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        run: pnpm run test:e2e

      - name: upload playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: apps/f311x/playwright-report/
          retention-days: 14

      - name: comment preview url
        if: ${{ !cancelled() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
          PREVIEW_STATUS: >-
            ${{ (steps.smoke.outcome == 'success' && steps.e2e.outcome == 'success')
            && '✅ passed' || '❌ failed' }}
        run: bun bin/comment-preview.ts

  teardown:
    name: destroy preview stage
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: destroy preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.F311X_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.F311X_CLOUDFLARE_ACCOUNT_ID }}
          ALCHEMY_NO_TUI: '1'
          ALCHEMY_TELEMETRY_DISABLED: '1'
        run: bun bin/destroy-preview.ts
