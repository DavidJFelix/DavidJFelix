[tools]
node = "26"
pnpm = "11"
# bun runs the deploy/smoke scripts in apps/*/bin (repo rule: scripts are
# bun, not bash). Declared here because CI's `mise install` runs at the repo
# root and does not read app-level mise.toml [tools].
bun = "1"
biome = "2"
oxlint = "1"
prettier = "3.9.4"
actionlint = "1"
ghalint = "1"
zizmor = "1.26.1"
pinact = "4.1.0"
"npm:cspell" = "10.0.1"
depot = { version = "latest", exe = "depot" }

# Repo-root checks, scoped to the config files the root owns. Legacy project
# dirs (Advent-of-Code, Exercism, etc.) are intentionally out of scope, and
# apps/* shadow these tasks with their own.
[tasks.format]
description = "Check formatting of repo-root config files (Biome)"
run = "biome check biome.jsonc .oxlintrc.json .prettierrc.json .config/cspell.json .github/renovate.json .vscode/settings.json .vscode/extensions.json"
dir = "{{config_root}}"

[tasks."format:fix"]
description = "Apply formatting fixes to repo-root config files"
run = "biome check --write biome.jsonc .oxlintrc.json .prettierrc.json .config/cspell.json .github/renovate.json .vscode/settings.json .vscode/extensions.json"
dir = "{{config_root}}"

[tasks.spell]
description = "Spell-check repo-owned sources (cspell)"
run = "cspell --config .config/cspell.json --no-progress --dot 'apps/**' 'docs/**' 'bin/**' '*.md' '.config/**' '.github/**'"
dir = "{{config_root}}"

[tasks."test:bin"]
description = "Unit-test the repo-root bin/ scripts (bun test)"
run = "bun test bin/"
dir = "{{config_root}}"

# Monorepo aggregators: fan a task out to every app. Per-app CI still runs each
# app's tasks on path-filtered triggers; these are the local "verify everything"
# commands. They run each app with CI=true to dodge pnpm's no-TTY deps-purge abort.
[tasks.test]
description = "Run every app's unit tests"
run = "bun bin/run-app-tasks.ts test"
dir = "{{config_root}}"

[tasks.check]
description = "Run every app's full check (typecheck, lint, format, test, build)"
run = "bun bin/run-app-tasks.ts check"
dir = "{{config_root}}"
