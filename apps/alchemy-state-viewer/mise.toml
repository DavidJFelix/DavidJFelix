# Canonical check tasks for this app. CI and automation discover checks here;
# tasks delegate to package.json scripts. Assumes `pnpm install` has run.

[tasks.typecheck]
description = "Type-check with svelte-check"
run = "pnpm run typecheck"

[tasks.lint]
description = "Lint with Oxlint + Biome"
run = "pnpm run lint"

[tasks.format]
description = "Check formatting (oxfmt; Prettier for md/mdx)"
run = "pnpm run format"

[tasks."format:fix"]
description = "Apply formatting fixes"
run = "pnpm run format:fix"

[tasks.test]
description = "Unit tests with Vitest (v8 coverage gated on src/lib)"
run = "pnpm run test"

[tasks.build]
description = "Build with Vite (SvelteKit cloudflare adapter)"
run = "pnpm run build"

[tasks.smoke]
description = "Smoke-test a local production boot (wrangler dev on the built worker)"
depends = ["build"]
run = "bun bin/smoke-local.ts"

[tasks.check]
description = "Run all checks"
depends = ["typecheck", "lint", "format", "test", "build"]
