name: CD Deploy ravrun

on:
  push:
    branches: [main]
    paths:
      - 'apps/ravrun/**'
      - '.github/workflows/cd-deploy-ravrun.yml'

defaults:
  run:
    working-directory: apps/ravrun

jobs:
  deploy:
    name: wrangler deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: mise
        uses: ./.github/actions/setup-mise

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      # Client observability vars, inlined at build by Vite. VITE_PUBLIC_SENTRY_DSN
      # turns the browser Sentry SDK on; VITE_PUBLIC_POSTHOG_KEY turns PostHog on.
      # Both public (repo variables). Unset means Vite dead-code-eliminates the
      # SDKs, so preview/CI ship zero vendor code; unset until issue #261 sets
      # them, so deploys stay dark. The worker (src/worker.ts) reads SENTRY_DSN at
      # runtime from a Cloudflare Worker var (set separately, also #261).
      - name: vite build
        env:
          VITE_PUBLIC_SENTRY_DSN: ${{ vars.SENTRY_DSN_RAVRUN }}
          VITE_PUBLIC_POSTHOG_KEY: ${{ vars.POSTHOG_KEY_RAVRUN }}
        run: pnpm exec vite build

      # `wrangler deploy` bundles the worker (src/worker.ts, per wrangler.toml
      # `main`) and uploads the built SPA in dist/ as its assets.
      - name: wrangler deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: apps/ravrun
