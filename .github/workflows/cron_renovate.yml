name: Cron Renovate

# Self-hosted Renovate runner. Reads .github/renovate.json for repo config
# (batching, schedule, lockFileMaintenance, vulnerability handling).
#
# Authenticates as a GitHub App via RENOVATE_APP_ID + RENOVATE_APP_PRIVATE_KEY
# secrets. The App pattern (vs. a PAT) gets higher API rate limits, lets
# Renovate PRs trigger downstream CI workflows, and is portable to the
# closed-source repos that want to copy this setup. App setup is tracked
# in #140.
on:
  schedule:
    # Hourly wake-up. Actual PR cadence is controlled by the `schedule:`
    # field inside .github/renovate.json (weekly, Monday); this cron just
    # keeps Renovate responsive between sweeps for dashboard checkboxes,
    # PR rebases, and security alerts.
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  renovate:
    name: renovate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      # Renovate authenticates via the App-minted token for all git and API
      # operations, so the workflow's GITHUB_TOKEN only needs read access
      # for the checkout.
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: mint github app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - name: renovate
        uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          token: ${{ steps.app-token.outputs.token }}
          # Per-repo config is auto-discovered from .github/renovate.json;
          # no configurationFile needed.
