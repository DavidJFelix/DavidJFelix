name: Import secrets and variables to Depot CI
on: push

permissions:
  id-token: write
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: depot/setup-action@v1
      - name: Import secrets
        env:
          ATPROTO_APP_PASSWORD: ${{ secrets.ATPROTO_APP_PASSWORD }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          F311X_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.F311X_CLOUDFLARE_ACCOUNT_ID }}
          F311X_CLOUDFLARE_API_TOKEN: ${{ secrets.F311X_CLOUDFLARE_API_TOKEN }}
          RENOVATE_APP_PRIVATE_KEY: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          RENOVATE_CLIENT_ID: ${{ secrets.RENOVATE_CLIENT_ID }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          unset DEPOT_TOKEN
          depot ci secrets add ATPROTO_APP_PASSWORD="$ATPROTO_APP_PASSWORD" CLAUDE_CODE_OAUTH_TOKEN="$CLAUDE_CODE_OAUTH_TOKEN" CLOUDFLARE_ACCOUNT_ID="$CLOUDFLARE_ACCOUNT_ID" CLOUDFLARE_API_TOKEN="$CLOUDFLARE_API_TOKEN" F311X_CLOUDFLARE_ACCOUNT_ID="$F311X_CLOUDFLARE_ACCOUNT_ID" F311X_CLOUDFLARE_API_TOKEN="$F311X_CLOUDFLARE_API_TOKEN" RENOVATE_APP_PRIVATE_KEY="$RENOVATE_APP_PRIVATE_KEY" RENOVATE_CLIENT_ID="$RENOVATE_CLIENT_ID" SENTRY_AUTH_TOKEN="$SENTRY_AUTH_TOKEN" --repo DavidJFelix/DavidJFelix
  variables:
    runs-on: ubuntu-latest
    steps:
      - uses: depot/setup-action@v1
      - name: Import variables
        env:
          POSTHOG_KEY_CALENDAR_VISUALIZER: ${{ vars.POSTHOG_KEY_CALENDAR_VISUALIZER }}
          POSTHOG_KEY_DAVIDJFELIX_COM: ${{ vars.POSTHOG_KEY_DAVIDJFELIX_COM }}
          POSTHOG_KEY_DJF_IO: ${{ vars.POSTHOG_KEY_DJF_IO }}
          POSTHOG_KEY_F311X: ${{ vars.POSTHOG_KEY_F311X }}
          POSTHOG_KEY_FORZAMONICA_COM: ${{ vars.POSTHOG_KEY_FORZAMONICA_COM }}
          POSTHOG_KEY_MONICANDAVID_COM: ${{ vars.POSTHOG_KEY_MONICANDAVID_COM }}
          POSTHOG_KEY_ONVIBES_ORG: ${{ vars.POSTHOG_KEY_ONVIBES_ORG }}
          POSTHOG_KEY_PKG_DOG: ${{ vars.POSTHOG_KEY_PKG_DOG }}
          POSTHOG_KEY_RAVRUN: ${{ vars.POSTHOG_KEY_RAVRUN }}
          POSTHOG_KEY_REVISION_CITY: ${{ vars.POSTHOG_KEY_REVISION_CITY }}
          POSTHOG_KEY_STARTCHI_COM: ${{ vars.POSTHOG_KEY_STARTCHI_COM }}
          SENTRY_DSN_CALENDAR_VISUALIZER: ${{ vars.SENTRY_DSN_CALENDAR_VISUALIZER }}
          SENTRY_DSN_DAVIDJFELIX_COM: ${{ vars.SENTRY_DSN_DAVIDJFELIX_COM }}
          SENTRY_DSN_DJF_IO: ${{ vars.SENTRY_DSN_DJF_IO }}
          SENTRY_DSN_F311X: ${{ vars.SENTRY_DSN_F311X }}
          SENTRY_DSN_FORZAMONICA_COM: ${{ vars.SENTRY_DSN_FORZAMONICA_COM }}
          SENTRY_DSN_MONICANDAVID_COM: ${{ vars.SENTRY_DSN_MONICANDAVID_COM }}
          SENTRY_DSN_ONVIBES_ORG: ${{ vars.SENTRY_DSN_ONVIBES_ORG }}
          SENTRY_DSN_PKG_DOG: ${{ vars.SENTRY_DSN_PKG_DOG }}
          SENTRY_DSN_RAVRUN: ${{ vars.SENTRY_DSN_RAVRUN }}
          SENTRY_DSN_REVISION_CITY: ${{ vars.SENTRY_DSN_REVISION_CITY }}
          SENTRY_DSN_STARTCHI_COM: ${{ vars.SENTRY_DSN_STARTCHI_COM }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT_CALENDAR_VISUALIZER: ${{ vars.SENTRY_PROJECT_CALENDAR_VISUALIZER }}
          SENTRY_PROJECT_DAVIDJFELIX_COM: ${{ vars.SENTRY_PROJECT_DAVIDJFELIX_COM }}
          SENTRY_PROJECT_DJF_IO: ${{ vars.SENTRY_PROJECT_DJF_IO }}
          SENTRY_PROJECT_ONVIBES_ORG: ${{ vars.SENTRY_PROJECT_ONVIBES_ORG }}
        run: |
          unset DEPOT_TOKEN
          depot ci vars add POSTHOG_KEY_CALENDAR_VISUALIZER="$POSTHOG_KEY_CALENDAR_VISUALIZER" POSTHOG_KEY_DAVIDJFELIX_COM="$POSTHOG_KEY_DAVIDJFELIX_COM" POSTHOG_KEY_DJF_IO="$POSTHOG_KEY_DJF_IO" POSTHOG_KEY_F311X="$POSTHOG_KEY_F311X" POSTHOG_KEY_FORZAMONICA_COM="$POSTHOG_KEY_FORZAMONICA_COM" POSTHOG_KEY_MONICANDAVID_COM="$POSTHOG_KEY_MONICANDAVID_COM" POSTHOG_KEY_ONVIBES_ORG="$POSTHOG_KEY_ONVIBES_ORG" POSTHOG_KEY_PKG_DOG="$POSTHOG_KEY_PKG_DOG" POSTHOG_KEY_RAVRUN="$POSTHOG_KEY_RAVRUN" POSTHOG_KEY_REVISION_CITY="$POSTHOG_KEY_REVISION_CITY" POSTHOG_KEY_STARTCHI_COM="$POSTHOG_KEY_STARTCHI_COM" SENTRY_DSN_CALENDAR_VISUALIZER="$SENTRY_DSN_CALENDAR_VISUALIZER" SENTRY_DSN_DAVIDJFELIX_COM="$SENTRY_DSN_DAVIDJFELIX_COM" SENTRY_DSN_DJF_IO="$SENTRY_DSN_DJF_IO" SENTRY_DSN_F311X="$SENTRY_DSN_F311X" SENTRY_DSN_FORZAMONICA_COM="$SENTRY_DSN_FORZAMONICA_COM" SENTRY_DSN_MONICANDAVID_COM="$SENTRY_DSN_MONICANDAVID_COM" SENTRY_DSN_ONVIBES_ORG="$SENTRY_DSN_ONVIBES_ORG" SENTRY_DSN_PKG_DOG="$SENTRY_DSN_PKG_DOG" SENTRY_DSN_RAVRUN="$SENTRY_DSN_RAVRUN" SENTRY_DSN_REVISION_CITY="$SENTRY_DSN_REVISION_CITY" SENTRY_DSN_STARTCHI_COM="$SENTRY_DSN_STARTCHI_COM" SENTRY_ORG="$SENTRY_ORG" SENTRY_PROJECT_CALENDAR_VISUALIZER="$SENTRY_PROJECT_CALENDAR_VISUALIZER" SENTRY_PROJECT_DAVIDJFELIX_COM="$SENTRY_PROJECT_DAVIDJFELIX_COM" SENTRY_PROJECT_DJF_IO="$SENTRY_PROJECT_DJF_IO" SENTRY_PROJECT_ONVIBES_ORG="$SENTRY_PROJECT_ONVIBES_ORG" --repo DavidJFelix/DavidJFelix
