# Depot CI Migration
# Source: .github/workflows/cd-deploy-calendar-visualizer.yml
#
# Changes made:
# - Rewrote .github/ path references to .depot/
# - Changed GitHub runs-on labels to their Depot equivalents

name: CD Deploy calendar-visualizer
on:
  push:
    branches: [main]
    paths:
      - 'apps/calendar-visualizer/**'
      - '.depot/workflows/cd-deploy-calendar-visualizer.yml'
      - '.depot/actions/snapshot-setup/**'
env:
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}
defaults:
  run:
    working-directory: apps/calendar-visualizer
jobs:
  snapshot:
    name: snapshot image
    # Shared calendar-visualizer sandbox image (mise tools + node_modules + Chromium).
    # Depot skips this job while the image tag exists; the other jobs boot
    # from the image. See docs/contributing/github-actions-style.md.
    runs-on: depot-ubuntu-latest
    snapshot:
      image-name: calendar-visualizer
      version: v1
      with:
        max-age: 7d
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: snapshot setup
        uses: ./.depot/actions/snapshot-setup
        with:
          app: calendar-visualizer
  deploy:
    name: wrangler deploy
    needs: snapshot
    runs-on:
      image: calendar-visualizer
      size: 2x8
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          clean: false
      - name: mise install
        run: mise install
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: panda codegen
        run: pnpm exec panda codegen
      - name: astro build
        env:
          PUBLIC_SENTRY_DSN: ${{ vars.SENTRY_DSN_CALENDAR_VISUALIZER }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_CALENDAR_VISUALIZER }}
          PUBLIC_POSTHOG_KEY: ${{ vars.POSTHOG_KEY_CALENDAR_VISUALIZER }}
        run: pnpm exec astro build
      - name: wrangler deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy -c dist/server/wrangler.json
          workingDirectory: apps/calendar-visualizer
