# Depot CI Migration
# Source: .github/workflows/cd-deploy-calendar-visualizer.yml
#
# Changes made:
# - Rewrote .github/ path references to .depot/
# - Changed GitHub runs-on labels to their Depot equivalents

name: CD Deploy calendar-visualizer
on:
  push:
    branches: [main]
    paths:
      - 'apps/calendar-visualizer/**'
      - '.depot/workflows/cd-deploy-calendar-visualizer.yml'
defaults:
  run:
    working-directory: apps/calendar-visualizer
jobs:
  deploy:
    name: wrangler deploy
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    steps:
      - name: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: mise
        uses: ./.depot/actions/setup-mise
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: panda codegen
        run: pnpm exec panda codegen
      - name: astro build
        env:
          PUBLIC_SENTRY_DSN: ${{ vars.SENTRY_DSN_CALENDAR_VISUALIZER }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_CALENDAR_VISUALIZER }}
          PUBLIC_POSTHOG_KEY: ${{ vars.POSTHOG_KEY_CALENDAR_VISUALIZER }}
        run: pnpm exec astro build
      - name: wrangler deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy -c dist/server/wrangler.json
          workingDirectory: apps/calendar-visualizer
