#:schema node_modules/wrangler/config-schema.json
name = "startchi-com"
# Custom server entry (src/server.ts) wraps the TanStack Start handler with Sentry
# (@sentry/cloudflare withSentry); @cloudflare/vite-plugin needs this explicit
# entry instead of the default @tanstack/react-start/server-entry
# (cloudflare/workers-sdk#11100). Server-side Sentry reads VITE_PUBLIC_SENTRY_DSN
# (inlined at build, same as the client); no-op until it's set.
main = "src/server.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# This worker serves via custom domains; explicitly keep workers.dev preview
# URLs on so `wrangler versions upload --preview-alias` (cd-preview) gets a
# reachable pr-<N> URL. Does not affect production routing.
preview_urls = true

# Custom domains, wired up in the Cloudflare dashboard.
routes = [
  { pattern = "startchi.com", custom_domain = true },
  { pattern = "www.startchi.com", custom_domain = true },
]

[observability]
enabled = true
