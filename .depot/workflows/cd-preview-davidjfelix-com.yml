# Depot CI Migration
# Source: .github/workflows/cd-preview-davidjfelix-com.yml
#
# Changes made:
# - Rewrote .github/ path references to .depot/
# - Changed GitHub runs-on labels to their Depot equivalents

name: CD Preview davidjfelix.com
# Per-PR preview deploy for davidjfelix.com (wrangler). On every PR touching the
# app: upload a non-active version with a pr-<N> preview alias, smoke the preview
# URL, screenshot-diff it against committed baselines, and post the URL. No
# teardown -- `wrangler versions upload` never serves production, so the custom
# domains (davidjfelix.com / www) stay on the active version. Forks have no
# secrets and will fail the deploy step -- acceptable for a personal monorepo;
# do NOT switch to pull_request_target.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/davidjfelix.com/**'
      - '.depot/workflows/cd-preview-davidjfelix-com.yml'
      - '.depot/actions/preview-wrangler/**'
      - '.depot/actions/snapshot-setup/**'
      - 'bin/**'
concurrency:
  group: preview-davidjfelix-com-${{ github.event.pull_request.number }}
  cancel-in-progress: true
defaults:
  run:
    working-directory: apps/davidjfelix.com
env:
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}
jobs:
  snapshot:
    name: snapshot image
    # Shared davidjfelix-com sandbox image (mise tools + node_modules + Chromium).
    # Depot skips this job while the image tag exists; the other jobs boot
    # from the image. See docs/contributing/github-actions-style.md.
    runs-on: depot-ubuntu-latest
    snapshot:
      image-name: davidjfelix-com
      version: v1
      with:
        max-age: 7d
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: snapshot setup
        uses: ./.depot/actions/snapshot-setup
        with:
          app: davidjfelix.com
  preview:
    name: deploy + smoke + screenshots
    needs: snapshot
    runs-on:
      image: davidjfelix-com
      size: 2x8
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          clean: false
      - name: mise install
        run: mise install
      - name: preview
        uses: ./.depot/actions/preview-wrangler
        with:
          worker-name: davidjfelix-com
          pr-number: ${{ github.event.pull_request.number }}
          smoke-routes: /
          wrangler-config: dist/server/wrangler.json
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
