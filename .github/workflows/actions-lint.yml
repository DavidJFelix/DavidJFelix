name: Actions hygiene

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/zizmor.yml'
      - '.config/mise.toml'
      - 'ghalint.yaml'
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/zizmor.yml'
      - '.config/mise.toml'
      - 'ghalint.yaml'

jobs:
  lint:
    name: actionlint + ghalint + zizmor + pinact
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
        with:
          install: true
          cache: true

      - name: Verify mise.lock matches mise.toml
        # mise install during the previous step updates .config/mise.lock if
        # mise.toml has gained or bumped a tool. A non-empty diff here means
        # whoever changed mise.toml forgot to commit the lockfile update.
        run: git diff --exit-code .config/mise.lock

      - name: actionlint
        run: actionlint

      - name: ghalint
        run: ghalint run

      - name: zizmor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: zizmor .github/workflows/

      - name: pinact verify
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pinact run --check
