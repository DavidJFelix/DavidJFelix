name: CI spell

# Repo-wide spell check. Unlike the per-app and root-config workflows, this has no
# paths filter: cspell is a universal gate that runs on every push and PR.
on:
  push:
    branches: [main]
  pull_request:

env:
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}

jobs:
  spell:
    name: spell check (cspell)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: mise
        uses: ./.github/actions/setup-mise

      - name: spell
        run: mise run spell
