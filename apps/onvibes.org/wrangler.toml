#:schema node_modules/wrangler/config-schema.json
name = "onvibes-org"
# Flue owns the deployed Worker and hosts Astro inside it (src/app.ts); `flue
# build` overrides `main` with its generated entry. This value is what the
# @astrojs/cloudflare adapter uses for its own (unused) build output.
main = "@astrojs/cloudflare/entrypoints/server"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# This worker serves via custom domains; explicitly keep workers.dev preview
# URLs on so `wrangler versions upload --preview-alias` (cd-preview) gets a
# reachable pr-<N> URL. Does not affect production routing.
preview_urls = true

# Custom domains, wired up in the Cloudflare dashboard.
routes = [
  { pattern = "onvibes.org", custom_domain = true },
  { pattern = "www.onvibes.org", custom_domain = true },
]

# Astro's static client output. Cloudflare serves these before the Worker, so
# prerendered pages and hashed assets come straight from here; `run_worker_first`
# routes the Flue agent API (/api/*) to the Worker instead. Non-asset requests
# fall through to the Worker, which forwards them to the Astro handler.
[assets]
directory = "./dist/client"
binding = "ASSETS"
run_worker_first = ["/api/*"]

# Durable Objects backing the Flue agent runtime. `flue build` generates these
# classes (one per agent, plus the registry) and exports them from the Worker.
# SQLite storage must be enabled via a migration. Astro reads a separate,
# DO-free config (wrangler-astro.jsonc) so its own build doesn't try to validate
# these classes it never exports.
#
# NOTE: array-of-tables must come after all top-level keys in TOML, or the keys
# below a `[[...]]` header get absorbed into it.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["FlueAssistantAgent", "FlueRegistry"]
