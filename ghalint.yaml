# ghalint suppressions.
#
# anthropics/claude-code-action runs `git fetch` during setup before
# configuring its own auth, so the checkout step must keep
# persist-credentials enabled. Tracked upstream at
# anthropics/claude-code-action#1236.
excludes:
  - policy_name: checkout_persist_credentials_should_be_false
    workflow_file_path: .github/workflows/bot_claude.yml
    job_name: claude
  - policy_name: checkout_persist_credentials_should_be_false
    workflow_file_path: .github/workflows/bot_claude_code_review.yml
    job_name: claude-review
  - policy_name: checkout_persist_credentials_should_be_false
    workflow_file_path: .github/workflows/dependency-freshness.yml
    job_name: freshness
