# Tasks for the pkg.dog Phase 2 feasibility spike. Assumes `bun install` has run.

[tasks.decompose]
description = "Fetch a JSR package, decompose it into parts, emit + verify them (default: @std/collections)"
run = "bun bin/decompose.ts"

[tasks.test]
description = "Unit tests for the decomposition pipeline"
run = "bun test"

[tasks.verify-registry]
description = "Serve emitted parts over the npm protocol and install them with a real npm client"
run = "bun bin/verify-registry.ts"
