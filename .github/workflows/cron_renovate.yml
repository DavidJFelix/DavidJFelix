name: Cron Renovate

# Self-hosted Renovate runner. Reads .github/renovate.json for repo config
# (batching, schedule, lockFileMaintenance, vulnerability handling).
#
# Authenticates as a GitHub App via RENOVATE_CLIENT_ID + RENOVATE_APP_PRIVATE_KEY
# secrets. The App pattern (vs. a PAT) gets higher API rate limits, lets
# Renovate PRs trigger downstream CI workflows, and is portable to the
# closed-source repos that want to copy this setup. App setup is tracked
# in #141.
on:
  schedule:
    # Hourly wake-up. Actual PR cadence is controlled by the `schedule:`
    # field inside .github/renovate.json (weekly, Monday); this cron just
    # keeps Renovate responsive between sweeps for dashboard checkboxes,
    # PR rebases, and security alerts.
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  renovate:
    name: renovate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      # Renovate authenticates via the App-minted token for all git and API
      # operations, so the workflow's GITHUB_TOKEN only needs read access
      # for the checkout.
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: mint github app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RENOVATE_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          # Scope the minted token to least privilege — without these the
          # token inherits the App's full installation permissions.
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write
          permission-statuses: write
          permission-workflows: write
          permission-checks: read
          permission-vulnerability-alerts: read

      - name: renovate
        uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          token: ${{ steps.app-token.outputs.token }}
          # Per-repo config is auto-discovered from .github/renovate.json;
          # no configurationFile needed.
        env:
          # The minted App token behaves like a PAT, so Renovate has no
          # implicit repo to act on — without this it logs "No repositories
          # found" and exits. Scope it to just this repo, which also keeps
          # the one-App-across-N-repos pattern clean: each repo's workflow
          # runs Renovate only against itself.
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_CUSTOM_ENV_VARIABLES: '{"MISE_YES":"1"}'
