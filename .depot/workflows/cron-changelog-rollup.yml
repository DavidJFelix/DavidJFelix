name: Cron Changelog Rollup
# Weekly roll-up of docs/changelog/fragments/ into the monthly changelog files
# (mise run changelog:rollup), pushed to a fixed branch and opened as a PR.
# Also runnable on demand via workflow_dispatch. The branch is force-pushed
# each run, so a still-open roll-up PR simply updates to include every pending
# fragment; a fresh PR is only created when none is open.
#
# Authenticates as the repo's GitHub App (same Depot secrets as
# cron-renovate.yml) because a GITHUB_TOKEN-created PR would not trigger the
# CI workflows that gate it (ci-docs prettier check).
on:
  schedule:
    # Weekly, Monday 09:00 UTC -- matching Renovate's weekly sweep cadence.
    - cron: '0 9 * * 1'
  workflow_dispatch:
env:
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}
jobs:
  rollup:
    name: changelog rollup
    runs-on: depot-ubuntu-latest
    timeout-minutes: 15
    permissions:
      # All pushes and PR calls use the App-minted token; the workflow's
      # GITHUB_TOKEN only needs read access for the checkout.
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: mise
        uses: ./.depot/actions/setup-mise
      - name: changelog rollup
        run: mise run changelog:rollup
      - name: prettier
        # The folded monthly files must stay Prettier-clean; fail here rather
        # than opening a PR that fails ci-docs.
        run: mise run format:md
      - name: mint github app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RENOVATE_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          # Scope the minted token to least privilege -- without these the
          # token inherits the App's full installation permissions.
          permission-contents: write
          permission-pull-requests: write
      - name: git push
        id: push
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git add -A docs/changelog
          if git diff --cached --quiet; then
            echo 'No fragments to roll up.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'docs(repo): roll up changelog fragments'
          # persist-credentials is false (ghalint policy 013), so push via an
          # explicit token URL instead of a stored credential.
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" 'HEAD:refs/heads/cron/changelog-rollup'
          echo 'pushed=true' >> "$GITHUB_OUTPUT"
      - name: gh pr create
        if: steps.push.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          open_prs=$(gh pr list --head cron/changelog-rollup --state open --json number --jq length)
          if [ "$open_prs" = '0' ]; then
            gh pr create --head cron/changelog-rollup --title 'docs(repo): roll up changelog fragments' --body 'Weekly roll-up of docs/changelog/fragments/ into the monthly files, generated by the cron-changelog-rollup workflow (mise run changelog:rollup). Regenerated on each run until merged.'
          fi
