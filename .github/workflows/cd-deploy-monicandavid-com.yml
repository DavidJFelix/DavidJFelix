name: CD Deploy monicandavid.com

on:
  push:
    branches: [main]
    paths:
      - 'apps/monicandavid.com/**'
      - '.github/workflows/cd-deploy-monicandavid-com.yml'

defaults:
  run:
    working-directory: apps/monicandavid.com

jobs:
  deploy:
    name: wrangler deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: mise
        uses: ./.github/actions/setup-mise

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      # `pnpm install` already runs `panda codegen` via the prepare script, but
      # keep it explicit so the build does not depend on install side effects.
      - name: panda codegen
        run: pnpm exec panda codegen

      # SvelteKit's adapter-cloudflare emits the Worker into .svelte-kit/cloudflare
      # during `vite build`, so a plain `wrangler deploy` ships that output.
      #
      # Client observability vars, inlined by Vite. VITE_PUBLIC_SENTRY_DSN turns the
      # browser Sentry SDK on; VITE_PUBLIC_POSTHOG_KEY turns PostHog on. Both public
      # (repo variables). Unset means Vite dead-code-eliminates the SDKs, so
      # preview/CI ship zero vendor code; unset until issue #261 sets them, so
      # deploys stay dark. (Server-side Sentry is deferred for this SvelteKit app.)
      - name: vite build
        env:
          VITE_PUBLIC_SENTRY_DSN: ${{ vars.SENTRY_DSN_MONICANDAVID_COM }}
          VITE_PUBLIC_POSTHOG_KEY: ${{ vars.POSTHOG_KEY_MONICANDAVID_COM }}
        run: pnpm exec vite build

      - name: wrangler deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: apps/monicandavid.com
