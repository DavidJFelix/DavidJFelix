# Depot CI Migration
# Source: .github/workflows/cd-deploy-onvibes-org.yml
#
# Changes made:
# - Rewrote .github/ path references to .depot/
# - Changed GitHub runs-on labels to their Depot equivalents

name: CD Deploy onvibes.org
on:
  push:
    branches: [main]
    paths:
      - 'apps/onvibes.org/**'
      - '.depot/workflows/cd-deploy-onvibes-org.yml'
defaults:
  run:
    working-directory: apps/onvibes.org
jobs:
  deploy:
    name: wrangler deploy
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: mise
        uses: ./.depot/actions/setup-mise
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: panda codegen
        run: pnpm exec panda codegen
      - name: astro build
        env:
          PUBLIC_SENTRY_DSN: ${{ vars.SENTRY_DSN_ONVIBES_ORG }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_ONVIBES_ORG }}
          PUBLIC_POSTHOG_KEY: ${{ vars.POSTHOG_KEY_ONVIBES_ORG }}
        run: pnpm exec astro build
      # Flue owns the deployed Worker and hosts the Astro build inside it
      # (src/app.ts): the /api agent API plus its Durable Objects live there.
      # The step also re-injects the [assets] binding flue's build drops (see
      # bin/patch-flue-wrangler.ts).
      - name: flue build
        run: pnpm run build:worker
      # Deploy the Flue artifact, not dist/server/wrangler.json -- that config
      # is only the Astro adapter's build-validation shape (no /api, no DOs).
      # This must stay `deploy` (not `versions upload`): it applies the Durable
      # Object migrations, which version uploads cannot carry.
      - name: wrangler deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy -c dist-flue/onvibes_org/wrangler.json
          workingDirectory: apps/onvibes.org
