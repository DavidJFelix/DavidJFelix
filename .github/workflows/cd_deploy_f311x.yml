name: CD Deploy f311x

on:
  push:
    branches: [main]
    paths:
      - 'apps/f311x/**'
      - '.github/workflows/cd_deploy_f311x.yml'

defaults:
  run:
    working-directory: apps/f311x

jobs:
  deploy:
    name: alchemy deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: false

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      # Alchemy's Cloudflare.Vite resource builds the client + server bundle
      # itself during deploy, so there is no separate build step. The stage is
      # pinned because `alchemy deploy` otherwise defaults to `dev_${USER}`,
      # which would be `dev_runner` in CI.
      - name: alchemy deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALCHEMY_NO_TUI: '1'
          ALCHEMY_TELEMETRY_DISABLED: '1'
        run: pnpm exec alchemy deploy --stage prod --yes
