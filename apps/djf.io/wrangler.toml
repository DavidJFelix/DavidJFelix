#:schema node_modules/wrangler/config-schema.json
name = "djf-io"
# The worker entry: the @astrojs/cloudflare adapter's handler wrapped with
# Markdown for Agents content negotiation (src/lib/markdown-for-agents.ts).
# The build (via @cloudflare/vite-plugin) bundles it with the SSR manifest;
# on-demand routes (src/pages/bugs.ts, src/pages/diag) render here,
# prerendered pages are fetched from the assets below and converted to
# markdown when the request asks for it.
main = "src/worker.ts"
compatibility_date = "2026-04-29"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
# Markdown for Agents negotiates on the Accept header, which only the worker
# can see, so page requests must reach it instead of being served straight
# from assets. The negated prefixes are pure static files (hashed bundles,
# fonts, images, the search index) that can never negotiate to markdown; they
# keep bypassing the worker entirely.
run_worker_first = ["/*", "!/_astro/*", "!/pagefind/*", "!/og/*", "!/favicon.svg", "!/robots.txt"]
