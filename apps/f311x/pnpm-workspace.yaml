allowBuilds:
  # core-js's postinstall is only a funding banner -- no native build to run.
  core-js: false
  core-js-pure: false
  esbuild: true
  msgpackr-extract: true
  msw: true
  sharp: true
  workerd: true

# Pinned because pnpm's release-age supply-chain policy rejects packages
# published <24h ago; these track alchemy 2.0.0-beta.54 (see plan.md).
overrides:
  '@distilled.cloud/aws': 0.29.1
  '@distilled.cloud/axiom': 0.29.1
  '@distilled.cloud/cloudflare': 0.29.1
  '@distilled.cloud/core': 0.29.1
  '@distilled.cloud/neon': 0.29.1
  '@distilled.cloud/planetscale': 0.29.1
  # effect is capped at beta.94: beta.97 removed Schedule.either, which
  # alchemy 2.0.0-beta.61 (the newest v2 beta) still calls in its state store
  # and Cloudflare resources -- deploys die with "TypeError: Schedule.either
  # is not a function". Lift the cap when alchemy catches up to the new API.
  '@effect/platform-node-shared': 4.0.0-beta.99
