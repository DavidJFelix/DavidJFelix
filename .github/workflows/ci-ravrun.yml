name: CI ravrun

on:
  push:
    branches: [main]
    paths:
      - 'apps/ravrun/**'
      - '.config/cspell.json'
      - '.config/mise.toml'
      - 'biome.jsonc'
      - '.oxlintrc.json'
      - '.prettierrc.json'
      - '.github/workflows/ci-ravrun.yml'
  pull_request:
    paths:
      - 'apps/ravrun/**'
      - '.config/cspell.json'
      - '.config/mise.toml'
      - 'biome.jsonc'
      - '.oxlintrc.json'
      - '.prettierrc.json'
      - '.github/workflows/ci-ravrun.yml'

env:
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}

defaults:
  run:
    working-directory: apps/ravrun

jobs:
  typecheck:
    name: tsgo
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: mise
        uses: ./.github/actions/setup-mise

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: mise run typecheck

  lint:
    name: biome + oxlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: mise
        uses: ./.github/actions/setup-mise

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: lint
        run: mise run lint

  format:
    name: format check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: mise
        uses: ./.github/actions/setup-mise

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: format
        run: mise run format

  build:
    name: vite build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: mise
        uses: ./.github/actions/setup-mise

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: build
        run: mise run build

  vitest:
    name: vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: mise
        uses: ./.github/actions/setup-mise

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: vitest
        run: mise run test

  smoke:
    name: smoke (local production boot)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: mise
        uses: ./.github/actions/setup-mise

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: smoke
        run: mise run smoke
