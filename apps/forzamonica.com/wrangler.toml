#:schema node_modules/wrangler/config-schema.json
name = "forzamonica-com"
main = "@tanstack/react-start/server-entry"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# forzamonica.com is not registered yet, so the worker serves from its
# workers.dev URL. Once the domain is owned and its zone is in the account
# (see GitHub issue #223), add:
# routes = [
#   { pattern = "forzamonica.com", custom_domain = true },
#   { pattern = "www.forzamonica.com", custom_domain = true },
# ]

[observability]
enabled = true

[vars]
# mock.shop is Shopify's hosted mock Storefront API -- full schema, no store or
# token required. Cutover to the real store is config-only: point this at
# https://<store>.myshopify.com/api/<version>/graphql.json and set the
# SHOPIFY_STOREFRONT_PUBLIC_TOKEN secret (`wrangler secret put`).
SHOPIFY_STOREFRONT_API_URL = "https://mock.shop/api"
