name: CD Preview onvibes.org

# Per-PR preview deploy for onvibes.org (wrangler). On every PR touching the app:
# upload a non-active version with a pr-<N> preview alias, smoke the preview URL,
# screenshot-diff it against committed baselines, and post the URL. No teardown
# -- `wrangler versions upload` never serves production, so the custom domains
# stay on the active version. Forks have no secrets and will fail the deploy step
# -- acceptable for a personal monorepo; do NOT switch to pull_request_target.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/onvibes.org/**'
      - '.github/workflows/cd-preview-onvibes-org.yml'
      - '.github/actions/preview-wrangler/**'
      - 'bin/**'

concurrency:
  group: preview-onvibes-org-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}

jobs:
  preview:
    name: deploy + smoke + screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: mise
        uses: ./.github/actions/setup-mise

      - name: preview
        uses: ./.github/actions/preview-wrangler
        with:
          app: onvibes.org
          worker-name: onvibes-org
          pr-number: ${{ github.event.pull_request.number }}
          smoke-routes: /
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
